apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-fitness-app
  namespace: default
spec:
  provider: azure
  secretObjects:
  # This section creates a regular Kubernetes Secret from the Key Vault data
  # so that the Pod can load it into environment variables easily.
  - secretName: fitness-app-env-secret
    type: Opaque
    data:
    # 'objectName' must match the secret name in Key Vault
    # 'key' will be the name of the environment variable in Kubernetes
    - objectName: CosmosDb
      key: MONGODB_URI
    - objectName: JwtSecret
      key: JWT_SECRET
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "494c2956-6f44-44b6-bb67-9d7b353ab59c" # Replace with your Client ID
    keyvaultName: "vignesh-kv" # Replace with your Key Vault name
    tenantId: "5989c502-2330-4d91-b86c-78a102728614" # You can get this by running: az account show --query tenantId -otsv
    objects: |
      array:
        - |
          objectName: CosmosDb
          objectType: secret
          objectVersion: ""
        - |
          objectName: JwtSecret
          objectType: secret
          objectVersion: ""
